name: "Check, generate, and deploy (if push to master) xcsoar-data-content"

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:
  schedule:
    # 01h42Z everyday
    - cron: '42 1 * * *'

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  build:
    runs-on: ubuntu-latest
    needs: pre-commit
    # Run after successful pre-commit on PRs; on other events pre-commit is skipped (needs.*.result).
    if: always() && (needs.pre-commit.result == 'success' || needs.pre-commit.result == 'skipped')

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          fetch-depth: 0

      - name: "Install python requirements"
        run: |
          pip3 install -r requirements.txt

      - name: "Install shell requirements"
        run: |
          sudo apt -y install dos2unix

      - name: "Build PR"
        run: |
          bash -x ./build.sh
        env:
          PREVIOUS_COMMIT_PR: ${{ github.event.pull_request.base.sha }}
          PREVIOUS_COMMIT: ${{ github.event.before }}

      - name: "output repofile"
        run: |
          ls -R ./output/
          cat ./output/repository

      - name: "Deploy Push"
        run: |
          ./deploy.sh
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_KEY:  ${{ secrets.DEPLOY_KEY  }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
